apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-scheduler
  namespace: antifraud-system
  labels:
    app: airflow-scheduler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-scheduler
  template:
    metadata:
      labels:
        app: airflow-scheduler
    spec:
      serviceAccountName: airflow
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: scheduler
          image: antifraud-airflow:placeholder
          command: ["airflow"]
          args: ["scheduler"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - configMapRef:
                name: antifraud-config
            - secretRef:
                name: antifraud-secrets
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags/batch_prediction_dag.py
              subPath: batch_prediction_dag.py
            - name: dags
              mountPath: /opt/airflow/dags/fraud_training_dag.py
              subPath: fraud_training_dag.py
            - name: logs
              mountPath: /opt/airflow/logs
          livenessProbe:
            exec:
              command:
                - bash
                - -c
                - airflow jobs check --job-type SchedulerJob --hostname $(hostname)
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
