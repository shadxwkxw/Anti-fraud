apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-dags
  namespace: antifraud-system
data:
  fraud_training_dag.py: |
    from datetime import datetime, timedelta

    from airflow import DAG
    from airflow.providers.cncf.kubernetes.operators.kubernetes_pod import (
        KubernetesPodOperator,
    )

    NAMESPACE = "antifraud-system"
    BATCH_IMAGE = "antifraud-batch:latest"

    DEFAULT_ARGS = {
        "owner": "airflow",
        "start_date": datetime(2024, 1, 1),
        "retries": 1,
        "retry_delay": timedelta(minutes=10),
    }

    ENV_FROM = [
        {"configMapRef": {"name": "antifraud-config"}},
        {"secretRef": {"name": "antifraud-secrets"}},
    ]

    with DAG(
        dag_id="fraud_training_pipeline",
        default_args=DEFAULT_ARGS,
        description="Fraud model training pipeline",
        schedule="@weekly",
        catchup=False,
        max_active_runs=1,
        tags=["fraud", "training", "ml"],
    ) as dag:

        EXECUTION_DATE = "{{ ds }}"
        TRAIN_DATA_PATH = f"data/processed/train_{EXECUTION_DATE}.parquet"
        MODEL_PATH = f"models/random_forest/model_{EXECUTION_DATE}.joblib"

        prepare_data = KubernetesPodOperator(
            task_id="prepare_training_data",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/infrastructure/data_processing/make_splits.py",
                "--output", TRAIN_DATA_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        train = KubernetesPodOperator(
            task_id="train_model",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/application/training/train_random_forest_model.py",
                "--input", TRAIN_DATA_PATH,
                "--output", MODEL_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        evaluate = KubernetesPodOperator(
            task_id="evaluate_model",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/application/training/evaluate_model.py",
                "--model", MODEL_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        register = KubernetesPodOperator(
            task_id="register_model",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/application/training/register_model.py",
                "--model", MODEL_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        prepare_data >> train >> evaluate >> register

  batch_prediction_dag.py: |
    from datetime import datetime, timedelta

    from airflow import DAG
    from airflow.providers.cncf.kubernetes.operators.kubernetes_pod import (
        KubernetesPodOperator,
    )

    NAMESPACE = "antifraud-system"
    BATCH_IMAGE = "antifraud-batch:latest"

    DEFAULT_ARGS = {
        "owner": "airflow",
        "depends_on_past": False,
        "start_date": datetime(2024, 1, 1),
        "retries": 1,
        "retry_delay": timedelta(minutes=5),
    }

    ENV_FROM = [
        {"configMapRef": {"name": "antifraud-config"}},
        {"secretRef": {"name": "antifraud-secrets"}},
    ]

    with DAG(
        dag_id="fraud_batch_pipeline",
        default_args=DEFAULT_ARGS,
        description="Fraud batch scoring pipeline",
        schedule="@daily",
        catchup=False,
        max_active_runs=1,
        tags=["fraud", "batch", "ml"],
    ) as dag:

        EXECUTION_DATE = "{{ ds }}"
        INPUT_PATH = f"data/raw/transactions_{EXECUTION_DATE}.csv"
        FEATURES_PATH = f"data/processed/features_{EXECUTION_DATE}.parquet"
        PREDICTIONS_PATH = f"data/output/predictions_{EXECUTION_DATE}.csv"

        extract = KubernetesPodOperator(
            task_id="extract_data",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/infrastructure/data_processing/extract.py",
                "--date", EXECUTION_DATE,
                "--output", INPUT_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        validate = KubernetesPodOperator(
            task_id="validate_data",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/infrastructure/data_processing/validate.py",
                "--input", INPUT_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        features = KubernetesPodOperator(
            task_id="build_features",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/infrastructure/data_processing/build_features.py",
                "--input", INPUT_PATH,
                "--output", FEATURES_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        predict = KubernetesPodOperator(
            task_id="predict",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/application/batch_predict.py",
                "--input", FEATURES_PATH,
                "--output", PREDICTIONS_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        save = KubernetesPodOperator(
            task_id="save_results",
            namespace=NAMESPACE,
            image=BATCH_IMAGE,
            cmds=["python"],
            arguments=[
                "src/antifraud/infrastructure/storage/save_predictions.py",
                "--input", PREDICTIONS_PATH,
            ],
            env_from=ENV_FROM,
            service_account_name="airflow",
            is_delete_operator_pod=True,
            get_logs=True,
        )

        extract >> validate >> features >> predict >> save
