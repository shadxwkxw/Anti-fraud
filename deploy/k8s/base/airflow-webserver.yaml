apiVersion: v1
kind: Service
metadata:
  name: airflow-webserver
  namespace: antifraud-system
  labels:
    app: airflow-webserver
spec:
  type: NodePort
  selector:
    app: airflow-webserver
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30081
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-webserver
  namespace: antifraud-system
  labels:
    app: airflow-webserver
spec:
  replicas: 1
  selector:
    matchLabels:
      app: airflow-webserver
  template:
    metadata:
      labels:
        app: airflow-webserver
    spec:
      serviceAccountName: airflow
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        # Wait for Airflow DB to be ready
        - name: wait-for-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for airflow-db..."
              until nc -z airflow-db 5432; do sleep 2; done
              echo "DB is ready"
        # Run database migrations
        - name: db-init
          image: antifraud-airflow:placeholder
          command: ["airflow"]
          args: ["db", "migrate"]
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
        # Create admin user
        - name: create-admin
          image: antifraud-airflow:placeholder
          command:
            - bash
            - -c
            - |
              airflow users create \
                --username "$AIRFLOW_ADMIN_USERNAME" \
                --password "$AIRFLOW_ADMIN_PASSWORD" \
                --firstname Airflow \
                --lastname Admin \
                --role Admin \
                --email airflow@example.com || true
          envFrom:
            - configMapRef:
                name: airflow-config
            - secretRef:
                name: airflow-secrets
      containers:
        - name: webserver
          image: antifraud-airflow:placeholder
          command: ["airflow"]
          args: ["api-server"]
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: airflow-config
            - configMapRef:
                name: antifraud-config
            - secretRef:
                name: antifraud-secrets
            - secretRef:
                name: airflow-secrets
          volumeMounts:
            - name: dags
              mountPath: /opt/airflow/dags
            - name: logs
              mountPath: /opt/airflow/logs
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 768Mi
      volumes:
        - name: dags
          configMap:
            name: airflow-dags
        - name: logs
          persistentVolumeClaim:
            claimName: airflow-logs-pvc
