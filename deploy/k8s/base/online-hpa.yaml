apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: antifraud-online
  namespace: antifraud-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: antifraud-online
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
