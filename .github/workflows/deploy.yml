name: Deploy to Kubernetes

on:
  workflow_run:
    workflows: ["Release Images"]
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (default: latest)"
        required: false
        default: latest

jobs:
  upload-manifests:
    if: >
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload k8s manifests to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "deploy/k8s/"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

  deploy:
    needs: upload-manifests
    runs-on: ubuntu-latest
    steps:
      - name: Determine image tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.image_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Run deploy script via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_TAG: ${{ steps.tag.outputs.tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_ADMIN_USERNAME: ${{ secrets._AIRFLOW_WWW_USER_USERNAME }}
          AIRFLOW_ADMIN_PASSWORD: ${{ secrets._AIRFLOW_WWW_USER_PASSWORD }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: IMAGE_TAG,GHCR_USERNAME,GHCR_PASSWORD,POSTGRES_HOST,POSTGRES_PORT,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD,MINIO_ROOT_USER,MINIO_ROOT_PASSWORD,AIRFLOW_FERNET_KEY,AIRFLOW_ADMIN_USERNAME,AIRFLOW_ADMIN_PASSWORD
          command_timeout: 10m
          script: |
            set -eu
            cd "${{ secrets.DEPLOY_PATH }}"
            chmod +x deploy/k8s/scripts/k8s_deploy.sh
            deploy/k8s/scripts/k8s_deploy.sh \
              "${IMAGE_TAG}" "${IMAGE_TAG}" "${IMAGE_TAG}"

  verify:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Verify deployment health
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          command_timeout: 5m
          script: |
            set -eu
            echo "=== Pod status ==="
            kubectl -n antifraud-system get pods

            echo "=== Checking rollout status ==="
            kubectl -n antifraud-system rollout status deploy/antifraud-online --timeout=120s
            kubectl -n antifraud-system rollout status deploy/airflow-scheduler --timeout=120s
            kubectl -n antifraud-system rollout status deploy/airflow-webserver --timeout=120s

            echo "=== Checking StatefulSets ==="
            kubectl -n antifraud-system rollout status statefulset/antifraud-db --timeout=60s
            kubectl -n antifraud-system rollout status statefulset/airflow-db --timeout=60s

            echo "=== All components healthy ==="
