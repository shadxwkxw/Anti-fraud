name: CI/CD

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run flake8
        run: uv run flake8 src tests services

      - name: Run isort
        run: uv run isort --check-only src tests services

      - name: Run black
        run: uv run black --check src tests services

      - name: Run pylint
        run: uv run pylint src tests services

      - name: Run mypy
        run: uv run mypy src

      - name: Run unit tests
        run: uv run pytest -q

  build-and-push:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        include:
          - image_name: antifraud-online
            dockerfile: services/online/Dockerfile
          - image_name: antifraud-batch
            dockerfile: services/batch/Dockerfile
          - image_name: antifraud-airflow
            dockerfile: airflow/Dockerfile

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: |
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ matrix.image_name }}:${{ github.sha }}
            ghcr.io/${{ steps.repo.outputs.owner_lc }}/${{ matrix.image_name }}:latest

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Derive lowercase owner
        id: repo
        run: echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Copy deployment compose file
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          source: "docker-compose.prod.yml"
          target: ${{ secrets.DEPLOY_PATH }}
          strip_components: 0

      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.0
        env:
          AIRFLOW_DB_HOST: ${{ secrets.AIRFLOW_DB_HOST }}
          AIRFLOW_DB_NAME: ${{ secrets.AIRFLOW_DB_NAME }}
          AIRFLOW_DB_PASSWORD: ${{ secrets.AIRFLOW_DB_PASSWORD }}
          AIRFLOW_DB_PORT: ${{ secrets.AIRFLOW_DB_PORT }}
          AIRFLOW_DB_USER: ${{ secrets.AIRFLOW_DB_USER }}
          AIRFLOW_FERNET_KEY: ${{ secrets.AIRFLOW_FERNET_KEY }}
          AIRFLOW_WEBSERVER_PORT: ${{ secrets.AIRFLOW_WEBSERVER_PORT }}
          DOCKER_NAMESPACE: ${{ steps.repo.outputs.owner_lc }}
          DOCKER_REGISTRY: ghcr.io
          GHCR_PASSWORD: ${{ secrets.GHCR_READ_TOKEN }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          _AIRFLOW_WWW_USER_PASSWORD: ${{ secrets._AIRFLOW_WWW_USER_PASSWORD }}
          _AIRFLOW_WWW_USER_USERNAME: ${{ secrets._AIRFLOW_WWW_USER_USERNAME }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || '22' }}
          envs: AIRFLOW_DB_HOST,AIRFLOW_DB_NAME,AIRFLOW_DB_PASSWORD,AIRFLOW_DB_PORT,AIRFLOW_DB_USER,AIRFLOW_FERNET_KEY,AIRFLOW_WEBSERVER_PORT,DOCKER_NAMESPACE,DOCKER_REGISTRY,GHCR_PASSWORD,GHCR_USERNAME,IMAGE_TAG,POSTGRES_DB,POSTGRES_HOST,POSTGRES_PASSWORD,POSTGRES_PORT,POSTGRES_USER,_AIRFLOW_WWW_USER_PASSWORD,_AIRFLOW_WWW_USER_USERNAME
          script: |
            set -eu
            mkdir -p "${{ secrets.DEPLOY_PATH }}"
            cd "${{ secrets.DEPLOY_PATH }}"
            cat > .env <<EOF
            POSTGRES_HOST=${POSTGRES_HOST}
            POSTGRES_PORT=${POSTGRES_PORT}
            POSTGRES_DB=${POSTGRES_DB}
            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            DOCKER_REGISTRY=${DOCKER_REGISTRY}
            DOCKER_NAMESPACE=${DOCKER_NAMESPACE}
            IMAGE_TAG=${IMAGE_TAG}
            AIRFLOW_WEBSERVER_PORT=${AIRFLOW_WEBSERVER_PORT}
            AIRFLOW_DB_HOST=${AIRFLOW_DB_HOST}
            AIRFLOW_DB_PORT=${AIRFLOW_DB_PORT}
            AIRFLOW_DB_NAME=${AIRFLOW_DB_NAME}
            AIRFLOW_DB_USER=${AIRFLOW_DB_USER}
            AIRFLOW_DB_PASSWORD=${AIRFLOW_DB_PASSWORD}
            AIRFLOW_FERNET_KEY=${AIRFLOW_FERNET_KEY}
            _AIRFLOW_WWW_USER_USERNAME=${_AIRFLOW_WWW_USER_USERNAME}
            _AIRFLOW_WWW_USER_PASSWORD=${_AIRFLOW_WWW_USER_PASSWORD}
            EOF
            docker login ghcr.io -u "${GHCR_USERNAME}" -p "${GHCR_PASSWORD}"
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
