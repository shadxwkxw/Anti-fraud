name: CI

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - "**"

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run flake8
        run: uv run flake8 src tests services

      - name: Run isort
        run: uv run isort --check-only src tests services

      - name: Run black
        run: uv run black --check src tests services

      - name: Run pylint
        run: uv run pylint src tests services

      - name: Run mypy
        run: uv run mypy src

      - name: Run unit tests with coverage
        run: >
          uv run pytest -q
          --cov=src/antifraud
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=80

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
