services:
  antifraud-online:
    build:
      context: .
      dockerfile: services/online/Dockerfile
    container_name: antifraud-online
    env_file:
      - .env
    ports:
      - "8000:8000"
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AWS_ACCESS_KEY_ID: ${MINIO_ROOT_USER}
      AWS_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD}
      AWS_S3_ENDPOINT_URL: http://minio:9000
    depends_on:
      - minio
    networks:
      - antifraud-network

  airflow:
    build:
      context: .
      dockerfile: ./airflow/Dockerfile
    image: airflow-local:latest
    container_name: airflow
    entrypoint: /bin/bash -c "airflow db migrate && airflow users create --username $${_AIRFLOW_WWW_USER_USERNAME} --password $${_AIRFLOW_WWW_USER_PASSWORD} --firstname Airflow --lastname User --role Admin --email airflow@example.com || true && airflow standalone"
    env_file:
      - .env
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:${AIRFLOW_WEBSERVER_PORT}"
    environment:
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}?sslmode=require
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW__WEBSERVER__AUTHENTICATE: 'true'
      AIRFLOW__WEBSERVER__AUTH_BACKEND: 'airflow.www.security:init_appbuilder_views'
      AIRFLOW__WEBSERVER__RBAC: 'true'
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: ${AIRFLOW_WEBSERVER_PORT}
      AIRFLOW__WEBSERVER__WEB_SERVER_MASTER_TIMEOUT: '300'
      AIRFLOW__WEBSERVER__WEB_SERVER_WORKER_TIMEOUT: '300'
    volumes:
      - ./src/antifraud/interfaces/batch/dags:/opt/airflow/dags
      - /var/run/docker.sock:/var/run/docker.sock
      - ./airflow/logs:/opt/airflow/logs
      - ./configs:/app/configs
      - ./data:/app/data
      - ./models:/app/models
      - ./src:/opt/airflow/src
    networks:
      - antifraud-network

  minio:
    image: minio/minio:latest
    container_name: antifraud-minio
    entrypoint: /bin/sh -c "mkdir -p /data/antifraud-models && minio server /data --console-address ':9001'"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - antifraud-network

networks:
  antifraud-network:
    name: antifraud-network
    driver: bridge

volumes:
  minio_data:
