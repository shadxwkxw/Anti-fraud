services:
  antifraud-online:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/antifraud-online:${IMAGE_TAG}
    container_name: antifraud-online
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - antifraud-network

  antifraud-batch:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/antifraud-batch:${IMAGE_TAG}
    container_name: antifraud-batch
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./configs:/app/configs
    depends_on:
      - postgres
    networks:
      - antifraud-network

  postgres:
    image: postgres:15
    container_name: antifraud-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      AIRFLOW_DB_NAME: ${AIRFLOW_DB_NAME}
      AIRFLOW_DB_USER: ${AIRFLOW_DB_USER}
      AIRFLOW_DB_PASSWORD: ${AIRFLOW_DB_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    networks:
      - antifraud-network

  airflow-init:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/antifraud-airflow:${IMAGE_TAG}
    container_name: airflow-init
    restart: "no"
    entrypoint: >-
      /bin/bash -c
      "airflow db migrate &&
      airflow users create
      --username ${_AIRFLOW_WWW_USER_USERNAME}
      --password ${_AIRFLOW_WWW_USER_PASSWORD}
      --firstname Airflow
      --lastname User
      --role Admin
      --email airflow@example.com"
    env_file:
      - .env
    environment: &airflow_common_env
      AIRFLOW_HOME: /opt/airflow
      AIRFLOW__CORE__DAGS_FOLDER: /opt/airflow/dags
      AIRFLOW__CORE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@${AIRFLOW_DB_HOST}:${AIRFLOW_DB_PORT}/${AIRFLOW_DB_NAME}
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__WEBSERVER__AUTHENTICATE: "true"
      AIRFLOW__WEBSERVER__AUTH_BACKEND: airflow.www.security:init_appbuilder_views
      AIRFLOW__WEBSERVER__RBAC: "true"
      AIRFLOW__CORE__FERNET_KEY: ${AIRFLOW_FERNET_KEY}
      AIRFLOW__WEBSERVER__WEB_SERVER_PORT: ${AIRFLOW_WEBSERVER_PORT}
    volumes:
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
    networks:
      - antifraud-network

  airflow-webserver:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/antifraud-airflow:${IMAGE_TAG}
    container_name: airflow-webserver
    restart: unless-stopped
    command: airflow webserver
    ports:
      - "${AIRFLOW_WEBSERVER_PORT}:${AIRFLOW_WEBSERVER_PORT}"
    env_file:
      - .env
    environment:
      <<: *airflow_common_env
    volumes:
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
      - airflow-init
    networks:
      - antifraud-network

  airflow-scheduler:
    image: ${DOCKER_REGISTRY}/${DOCKER_NAMESPACE}/antifraud-airflow:${IMAGE_TAG}
    container_name: airflow-scheduler
    restart: unless-stopped
    command: airflow scheduler
    env_file:
      - .env
    environment:
      <<: *airflow_common_env
    volumes:
      - ./airflow/logs:/opt/airflow/logs
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      - postgres
      - airflow-init
    networks:
      - antifraud-network

networks:
  antifraud-network:
    name: antifraud-network
    driver: bridge

volumes:
  postgres_data:
